name: CI PIPELINE FOR MINI MLOPS PROJECT

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc

      - name: Run DVC Pipeline
        env:
          DVCS3MLFLOW: ${{ secrets.DVCS3MLFLOW }}
        run: |
          dvc repro --force

      - name: RUN Tests
        env:
           DVCS3MLFLOW: ${{ secrets.DVCS3MLFLOW }}
        run: |
           python -m unittest tests/testing.py

      - name: promote model to production
        if: ${{ success() }}
        env:
            DVCS3MLFLOW: ${{ secrets.DVCS3MLFLOW }}
        run: |
            python src/modeling/production_trans.py


      - name: docker login
        if : ${{ success() }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: set up buildx
        if : ${{ success() }}
        uses: docker/setup-buildx-action@v2

      - name: build and push docker image
        if : ${{ success() }}
        uses: docker/build-push-action@v4
        with: 
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/emotion_prediction:latest
          

